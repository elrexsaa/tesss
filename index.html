<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CodingX REXSAIT · API Premium</title>
    <!-- Tailwind via CDN + custom base layer untuk transisi smooth ala iOS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tambahin sedikit extra smoothness & font ala San Francisco -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7; /* abu-abu terang khas Apple */
        }
        /* Card glassmorphism + micro-interactions */
        .glass-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.02);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        .glass-card:hover {
            background: rgba(255,255,255,0.9);
            transform: scale(1.02) translateY(-3px);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.15);
            border-color: rgba(255,255,255,0.9);
        }
        /* animasi shimmer untuk loading */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.5s infinite;
        }
        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* tombol premium */
        .premium-button {
            background: rgba(0, 113, 227, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s ease;
        }
        .premium-button:hover {
            background: #0071e3;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,113,227,0.35);
        }
        /* skeleton loading ala iOS */
        .skeleton-box {
            background: linear-gradient(90deg, #e1e1e3 25%, #f1f1f3 50%, #e1e1e3 75%);
            background-size: 200% 100%;
            animation: loadingShimmer 1.2s infinite;
            border-radius: 16px;
        }
        /* custom scrollbar tipis */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-5 md:p-8" style="background: #f5f5f7;">

    <!-- wrapper utama dengan lebar maksimum layar iPhone Pro Max -->
    <div class="w-full max-w-7xl mx-auto">

        <!-- header ala aplikasi iOS -->
        <header class="flex justify-between items-center py-4 px-2 mb-3">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#0071e3] to-[#40a9ff] flex items-center justify-center shadow-md shadow-blue-200/50">
                    <span class="text-white text-xl font-semibold tracking-tight">📱</span>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-[#1d1d1f]">
                        CodingX <span class="text-[#0071e3]">REXSAIT</span>
                    </h1>
                    <p class="text-xs text-gray-500 -mt-1">API public · super smooth · premium</p>
                </div>
            </div>
            <div class="bg-white/60 backdrop-blur-xl py-2 px-4 rounded-full shadow-sm border border-white/30 text-sm font-medium text-gray-700">
                💼 bos-tuan besar
            </div>
        </header>

        <!-- panel statistik + tombol fetch / refresh premium -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-7">
            <div class="glass-card px-5 py-3 rounded-2xl flex items-center gap-3 text-sm">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="font-medium text-gray-700">Endpoint: JSONPlaceholder /users</span>
                <span class="bg-gray-200/60 px-2 py-0.5 rounded-full text-xs">10 data</span>
            </div>
            <button id="fetchBtn" class="premium-button text-white px-7 py-3 rounded-2xl font-medium text-sm flex items-center gap-2 shadow-lg shadow-blue-400/20 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-refresh-cw"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                <span>Ambil Data Users</span>
            </button>
        </div>

        <!-- area konten dinamis + skeleton loading -->
        <div id="contentArea" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 transition-all duration-500">
            <!-- isi awal kosong, akan diisi oleh JS dengan skeleton loading lalu data -->
        </div>

        <!-- footer tipis -->
        <div class="mt-12 text-center text-xs text-gray-400/80 font-medium tracking-wide border-t border-white/40 pt-6">
            <span class="bg-white/40 px-4 py-1.5 rounded-full backdrop-blur-sm">🍏 desain ala iPhone · by CodingX REXSAIT · 1 file index.html</span>
        </div>
    </div>

    <script>
        (function() {
            const contentArea = document.getElementById('contentArea');
            const fetchBtn = document.getElementById('fetchBtn');

            // state biar ga dobel fetch
            let loading = false;

            // Fungsi menampilkan skeleton loading (5 kotak)
            function renderSkeleton() {
                let skeletonHTML = '';
                for (let i = 0; i < 8; i++) { // 8 skeleton biar keliatan premium
                    skeletonHTML += `
                        <div class="glass-card rounded-3xl p-5 flex flex-col gap-3 opacity-80" style="backdrop-filter: blur(15px);">
                            <div class="skeleton-box w-14 h-14 rounded-2xl"></div>
                            <div class="skeleton-box w-full h-5 rounded-xl"></div>
                            <div class="skeleton-box w-3/4 h-4 rounded-xl"></div>
                            <div class="skeleton-box w-full h-10 rounded-2xl mt-2"></div>
                        </div>
                    `;
                }
                contentArea.innerHTML = skeletonHTML;
            }

            // Fungsi render data asli dari API
            function renderUsers(users) {
                let cardsHTML = '';
                users.forEach(user => {
                    // ambil inisial untuk avatar
                    const initial = user.name.charAt(0).toUpperCase();
                    // warna background acak tapi pastel
                    const hue = (user.id * 30) % 360;
                    const avatarColor = `hsl(${hue}, 70%, 85%)`;
                    const textColor = `hsl(${hue}, 50%, 30%)`;

                    cardsHTML += `
                        <div class="glass-card rounded-3xl p-5 flex flex-col gap-3 transition-all duration-300 ease-out hover:scale-[1.02]">
                            <!-- avatar dengan inisial & gaya premium -->
                            <div class="flex items-center gap-3">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl font-semibold shadow-sm" style="background-color: ${avatarColor}; color: ${textColor}">
                                    ${initial}
                                </div>
                                <div>
                                    <h3 class="font-semibold text-gray-800 text-lg tracking-tight">${user.name}</h3>
                                    <p class="text-xs text-gray-500 flex items-center gap-1 mt-0.5">
                                        <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span> @${user.username}
                                    </p>
                                </div>
                            </div>

                            <!-- detail kontak -->
                            <div class="mt-1 space-y-1 text-sm text-gray-600 border-t border-white/40 pt-3">
                                <div class="flex items-center gap-2">
                                    <span class="text-gray-400 w-5">📧</span>
                                    <span class="truncate">${user.email}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-gray-400 w-5">📞</span>
                                    <span>${user.phone.split(' ')[0]}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-gray-400 w-5">🏢</span>
                                    <span class="truncate">${user.company.name}</span>
                                </div>
                            </div>

                            <!-- website badge -->
                            <div class="mt-2 flex justify-between items-center">
                                <span class="text-xs bg-white/40 rounded-full px-3 py-1.5 backdrop-blur-sm border border-white/30">
                                    🌐 ${user.website}
                                </span>
                                <span class="text-xs text-gray-400">ID: ${user.id}</span>
                            </div>
                        </div>
                    `;
                });

                // kalau data kosong / error munculkan pesan khusus
                if (users.length === 0) {
                    contentArea.innerHTML = `
                        <div class="col-span-full flex justify-center py-20">
                            <div class="glass-card rounded-3xl py-12 px-8 text-center max-w-md">
                                <span class="text-6xl block mb-3">📭</span>
                                <h3 class="text-xl font-semibold text-gray-700">Tidak ada data</h3>
                                <p class="text-gray-500 text-sm mt-2">Bos-tuan besar, coba tekan tombol ambil data lagi.</p>
                            </div>
                        </div>
                    `;
                } else {
                    contentArea.innerHTML = cardsHTML;
                }
            }

            // Fungsi utama fetch data (simulasi API publik)
            async function fetchUsers() {
                if (loading) return;

                loading = true;
                renderSkeleton(); // langsung tampilkan skeleton

                try {
                    // Gunakan API publik JSONPlaceholder (users) 
                    const response = await fetch('https://jsonplaceholder.typicode.com/users');
                    
                    // sedikit delay buat ngerasain smooth loading (opsional)
                    await new Promise(resolve => setTimeout(resolve, 800));

                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }

                    const users = await response.json();
                    renderUsers(users);

                } catch (error) {
                    console.error('Gagal ambil data:', error);
                    // tampilkan error dengan gaya premium
                    contentArea.innerHTML = `
                        <div class="col-span-full flex justify-center py-16">
                            <div class="glass-card rounded-3xl py-12 px-8 text-center max-w-md border border-red-200/50">
                                <span class="text-5xl block mb-2">⚠️</span>
                                <h3 class="text-xl font-semibold text-red-500">Gagal memuat</h3>
                                <p class="text-gray-500 text-sm mt-2">${error.message}. Silakan coba lagi, bos-tuan besar.</p>
                                <button onclick="window.location.reload()" class="mt-5 bg-red-500/80 text-white px-6 py-2 rounded-full text-sm backdrop-blur-sm border border-white/30">🔄 Muat ulang</button>
                            </div>
                        </div>
                    `;
                } finally {
                    loading = false;
                }
            }

            // Event listener tombol fetch
            fetchBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fetchUsers();
            });

            // Langsung fetch saat halaman pertama kali dibuka (biar langsung ada data)
            // sedikit delay agar animasi skeleton terlihat smooth (opsional)
            window.addEventListener('load', () => {
                fetchUsers();
            });

            // Opsional: tambah efek haptic semu (getaran tipis) kalau di klik di device? gak bisa, tapi kasi style active aja
        })();
    </script>

    <!-- tambahan sedikit extra untuk menambah efek iOS (status bar waktu) -->
    <div style="position: fixed; top: 10px; right: 20px; z-index: 999; background: rgba(255,255,255,0.3); backdrop-filter: blur(20px); padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 500; color: #333; border: 0.5px solid rgba(255,255,255,0.6); display: none;" id="iosTime"></div>
    <script>
        // (opsional) jam kecil ala iPhone status bar, biar makin premium
        function updateTime() {
            const d = new Date();
            const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            const timeDiv = document.getElementById('iosTime');
            if (timeDiv) {
                timeDiv.style.display = 'block';
                timeDiv.innerText = timeStr;
            }
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
